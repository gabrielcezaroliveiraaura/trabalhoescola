<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galo de Ouro - Ranque de Raças Equinas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Elite<span>Equina</span></h1>
            <p>O guia definitivo e interativo das raças de cavalos mais valiosas do mundo</p>
        </div>
    </header>

    <main class="container">
        <section class="controls-section">
            <h2>Critério de Ranqueamento</h2>
            <p>Selecione abaixo para reordenar as raças com base na sua preferência:</p>
            <div class="btn-group">
                <button id="btn-geral" class="btn active">Desempenho Geral</button>
                <button id="btn-velocidade" class="btn">Velocidade em Corrida</button>
                <button id="btn-pureza" class="btn">Pureza de Linhagem</button>
                <button id="btn-preco" class="btn">Maior Valor de Mercado</button>
            </div>
        </section>

        <section id="horse-grid" class="horse-grid">
            </section>
    </main>

    <footer>
        <p>&copy; 2026 EliteEquina - Dados de mercado e genealogia baseados em registros internacionais.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
